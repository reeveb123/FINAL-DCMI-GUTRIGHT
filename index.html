<script>
    const slider = document.getElementById('imageSlider');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    
    let autoScrollTimer;
    const scrollInterval = 3000; // Time per slide in milliseconds (3 seconds)

    // Function to slide forward or loop back round
    function slideNext() {
        const slideWidth = slider.offsetWidth;
        const maxScrollLeft = slider.scrollWidth - slider.clientWidth;

        // If we are at the very last image, loop back to the first one smoothly
        if (slider.scrollLeft >= maxScrollLeft - 5) {
            slider.scrollTo({ left: 0, behavior: 'smooth' });
        } else {
            slider.scrollBy({ left: slideWidth, behavior: 'smooth' });
        }
    }

    function slidePrev() {
        const slideWidth = slider.offsetWidth;
        const maxScrollLeft = slider.scrollWidth - slider.clientWidth;

        // If we are at the beginning, snap directly to the last image
        if (slider.scrollLeft <= 5) {
            slider.scrollTo({ left: maxScrollLeft, behavior: 'smooth' });
        } else {
            slider.scrollBy({ left: -slideWidth, behavior: 'smooth' });
        }
    }

    // Handles resetting the timer smoothly on manual interaction
    function resetAutoScroll() {
        clearInterval(autoScrollTimer);
        autoScrollTimer = setInterval(slideNext, scrollInterval);
    }

    // Arrow Event Listeners
    nextBtn.addEventListener('click', () => {
        slideNext();
        resetAutoScroll();
    });

    prevBtn.addEventListener('click', () => {
        slidePrev();
        resetAutoScroll();
    });

    // Initialize the engine automatically on page load
    autoScrollTimer = setInterval(slideNext, scrollInterval);
</script>
